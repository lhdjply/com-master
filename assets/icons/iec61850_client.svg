       gradientUnits="userSpaceOnUse"
       gradientTransform="translate(-7.8732526,-8.111836)">
      <stop
         offset="0%"
         style="stop-color:#1a237e"
         id="stop1" />
      <stop
         offset="50%"
         style="stop-color:#0d47a1"
         id="stop2" />
      <stop
         offset="100%"
         style="stop-color:#00acc1"
         id="stop3" />
    </linearGradient>
    <!-- 电能渐变 - 金黄色 -->
    <linearGradient
       id="energyGradient"
       x1="0"
       y1="0"
       x2="1"
       y2="1">
      <stop
         offset="0%"
         style="stop-color:#ffd54f"
         id="stop4" />
      <stop
         offset="100%"
         style="stop-color:#ff8f00"
         id="stop5" />
    </linearGradient>
    <!-- 屏幕渐变 -->
    <linearGradient
