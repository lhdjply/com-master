         style="stop-color:#263238"
         id="stop6" />
      <stop
         offset="100%"
         style="stop-color:#37474f"
         id="stop7" />
    </linearGradient>
    <!-- 发光效果 -->
    <filter
       id="glow"
       x="-0.36555778"
       y="-0.2899977"
       width="1.7371995"
       height="1.5799923">
      <feGaussianBlur
         stdDeviation="3"
         result="coloredBlur"
         id="feGaussianBlur7" />
      <feMerge
         id="feMerge8">
        <feMergeNode
           in="coloredBlur"
           id="feMergeNode7" />
        <feMergeNode
           in="SourceGraphic"
           id="feMergeNode8" />
      </feMerge>
    </filter>
    <!-- 阴影 -->
    <filter
       id="shadow"
       x="0"
       y="0"
       width="1"
       height="1">
      <feDropShadow
         dx="2"
         dy="4"
         stdDeviation="4"
         flood-color="#000"
         flood-opacity="0.3" />
    </filter>
    <linearGradient
