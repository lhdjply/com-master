<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   version="1.1"
   width="200"
   height="200"
   viewBox="0 0 200 200"
   id="svg24"
   sodipodi:docname="network_tool.svg"
   inkscape:version="1.4 (e7c3feb100, 2024-10-09)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns:xlink="http://www.w3.org/1999/xlink"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview24"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="5.365"
     inkscape:cx="100"
     inkscape:cy="100"
     inkscape:window-width="2560"
     inkscape:window-height="1320"
     inkscape:window-x="0"
     inkscape:window-y="0"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg24" />
  <defs
     id="defs7">
    <linearGradient
       id="mainGradient"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="100%">
      <stop
         offset="0%"
         style="stop-color:#1a237e"
         id="stop1" />
      <stop
         offset="50%"
         style="stop-color:#0d47a1"
         id="stop2" />
      <stop
         offset="100%"
         style="stop-color:#00acc1"
         id="stop3" />
    </linearGradient>
    <linearGradient
       id="nodeGradient"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="100%">
      <stop
         offset="0%"
         style="stop-color:#4aadc2"
         id="stop4" />
      <stop
         offset="100%"
         style="stop-color:#00acc1"
         id="stop5" />
    </linearGradient>
    <linearGradient
       id="packetGradient"
       x1="0"
       y1="0"
       x2="12.649111"
       y2="12.649111"
       gradientTransform="scale(0.79056942,1.2649111)"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0%"
         style="stop-color:#ffd54f"
         id="stop6" />
      <stop
         offset="100%"
         style="stop-color:#ff8f00"
         id="stop7" />
    </linearGradient>
    <linearGradient
       inkscape:collect="always"
       xlink:href="#nodeGradient"
       id="linearGradient24"
       x1="14"
       y1="4"
       x2="26"
       y2="16"
       gradientUnits="userSpaceOnUse" />
    <linearGradient
       inkscape:collect="always"
       xlink:href="#nodeGradient"
       id="linearGradient25"
       x1="-1"
       y1="19"
       x2="11"
       y2="31"
       gradientUnits="userSpaceOnUse" />
    <linearGradient
       inkscape:collect="always"
       xlink:href="#nodeGradient"
       id="linearGradient26"
       x1="29"
       y1="19"
       x2="41"
       y2="31"
       gradientUnits="userSpaceOnUse" />
  </defs>
  <rect
     width="200"
     height="200"
     fill="url(#mainGradient)"
     rx="20"
     id="rect7" />
  <g
     transform="translate(10.866729,8.0708295)"
     id="g24">
    <!-- Server node (left) -->
    <rect
       x="20"
       y="60"
       width="50"
       height="80"
       rx="8"
       fill="#2c3e50"
       stroke="#4aadc2"
       stroke-width="3"
       id="rect8" />
    <rect
       x="30"
       y="75"
       width="30"
       height="8"
       rx="2"
       fill="#4aadc2"
       id="rect9" />
    <rect
       x="30"
       y="90"
       width="30"
       height="8"
       rx="2"
       fill="#4aadc2"
       id="rect10" />
    <rect
       x="30"
       y="105"
       width="30"
       height="8"
       rx="2"
       fill="#4aadc2"
       id="rect11" />
    <circle
       cx="35"
       cy="125"
       r="4"
       fill="#2ecc71"
       id="circle11" />
    <circle
       cx="45"
       cy="125"
       r="4"
       fill="#e74c3c"
       id="circle12" />
    <circle
       cx="55"
       cy="125"
       r="4"
       fill="#f39c12"
       id="circle13" />
    <!-- Client node (right) -->
    <rect
       x="110"
       y="60"
       width="50"
       height="80"
       rx="8"
       fill="#2c3e50"
       stroke="#4aadc2"
       stroke-width="3"
       id="rect13" />
    <rect
       x="120"
       y="75"
       width="30"
       height="8"
       rx="2"
       fill="#4aadc2"
       id="rect14" />
    <rect
       x="120"
       y="90"
       width="30"
       height="8"
       rx="2"
       fill="#4aadc2"
       id="rect15" />
    <rect
       x="120"
       y="105"
       width="30"
       height="8"
       rx="2"
       fill="#4aadc2"
       id="rect16" />
    <circle
       cx="125"
       cy="125"
       r="4"
       fill="#2ecc71"
       id="circle16" />
    <circle
       cx="135"
       cy="125"
       r="4"
       fill="#e74c3c"
       id="circle17" />
    <circle
       cx="145"
       cy="125"
       r="4"
       fill="#f39c12"
       id="circle18" />
    <!-- Network connection line -->
    <path
       d="m 70,100 h 40"
       stroke="#a6eefd"
       stroke-width="4"
       stroke-dasharray="8, 4"
       id="path18" />
    <!-- Data packets flowing -->
    <g
       transform="translate(85,92)"
       id="g18">
      <rect
         x="0"
         y="0"
         width="10"
         height="16"
         rx="2"
         fill="url(#packetGradient)"
         id="rect18"
         style="fill:url(#packetGradient)">
        <animate
           attributeName="x"
           values="-15;25"
           dur="2s"
           repeatCount="indefinite" />
      </rect>
    </g>
    <!-- TCP/UDP protocol labels -->
    <text
       x="45"
       y="170"
       font-family="Arial, sans-serif"
       font-size="12px"
       fill="#a6eefd"
       text-anchor="middle"
       font-weight="bold"
       id="text18">TCP</text>
    <text
       x="135"
       y="170"
       font-family="Arial, sans-serif"
       font-size="12px"
       fill="#a6eefd"
       text-anchor="middle"
       font-weight="bold"
       id="text19">UDP</text>
    <!-- Network icon at top -->
    <g
       transform="translate(70,10)"
       id="g23">
      <circle
         cx="20"
         cy="10"
         r="6"
         fill="url(#nodeGradient)"
         id="circle19"
         style="fill:url(#linearGradient24)" />
      <circle
         cx="5"
         cy="25"
         r="6"
         fill="url(#nodeGradient)"
         id="circle20"
         style="fill:url(#linearGradient25)" />
      <circle
         cx="35"
         cy="25"
         r="6"
         fill="url(#nodeGradient)"
         id="circle21"
         style="fill:url(#linearGradient26)" />
      <line
         x1="20"
         y1="10"
         x2="5"
         y2="25"
         stroke="#a6eefd"
         stroke-width="2"
         id="line21" />
      <line
         x1="20"
         y1="10"
         x2="35"
         y2="25"
         stroke="#a6eefd"
         stroke-width="2"
         id="line22" />
      <line
         x1="5"
         y1="25"
         x2="35"
         y2="25"
         stroke="#a6eefd"
         stroke-width="2"
         id="line23" />
    </g>
    <!-- Connection status indicator -->
    <circle
       cx="90"
       cy="100"
       r="6"
       fill="#2ecc71"
       stroke="#ffffff"
       stroke-width="2"
       id="circle23" />
  </g>
