name: Build

on:
  push:
    branches: [ '*' ]
    tags: [ '*' ]
  pull_request:
    branches: [ '*' ]
  workflow_dispatch:
  
env:
  APP_NAME: "ly-serial-tool"
  QT_VERSION: 6.8.0

jobs:
  build-deb:
    runs-on: ${{ matrix.config.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ubuntu-latest
            platform_tag: x86_64                 
          - os: ubuntu-24.04-arm
            platform_tag: aarch64

    container:
      image: ${{ matrix.config.platform_tag == 'aarch64' && 'linuxdeepin/deepin:crimson-arm64' || 'linuxdeepin/deepin:crimson' }}
      options: --user root

    steps:
    - uses: actions/checkout@v5
    - name: Update package lists and install basic tools
      run: |
        apt update
        apt install -y build-essential devscripts dh-make equivs

    - name: Determine source format and generate orig tarball if needed
      run: |
        set -e
        # Check if quilt format requires orig tarball
        if [ -f debian/source/format ]; then
          SOURCE_FORMAT=$(head -1 debian/source/format)
          case "$SOURCE_FORMAT" in
            "3.0 (quilt)"*)
              echo "::notice::Detected quilt format package, generating orig tarball"
              
              # Extract source name and version
              SOURCE_NAME=$(dpkg-parsechangelog -S Source)
              UPSTREAM_VERSION=$(dpkg-parsechangelog -S Version | sed 's/-[^-]*$//; s/^[0-9]\+://')

              ORIG_TARBALL="${SOURCE_NAME}_${UPSTREAM_VERSION}.orig.tar.gz"
              TEMP_DIR=$(mktemp -d)
              cd ..
              cp -r "${SOURCE_NAME}/." "${TEMP_DIR}/"
              rm -rf "${TEMP_DIR}/debian"
              tar -czf "${ORIG_TARBALL}" -C "${TEMP_DIR}" .
              rm -rf "${TEMP_DIR}"
              
              echo "::notice::Orig tarball created: ../${SOURCE_NAME}_${UPSTREAM_VERSION}.orig.tar.gz"
              ;;
            *)
              echo "::notice::Native package format detected, no orig tarball needed"
              ;;
          esac
        else
          echo "::warning::Missing debian/source/format, assuming native package format"
        fi

    - name: Install build dependencies
      run: |
        mk-build-deps -i -t "apt-get -y" "./debian/control"

    - name: Create DEB package
      run: debuild -us -uc

    - name: Move deb to deb_package
      run: |
        if ls ../*dbgsym*.deb 1> /dev/null 2>&1; then
          rm ../*dbgsym*.deb
        fi
        
        mkdir deb_package
        cp ../*.deb deb_package

    - name: 'Upload artifact: deb'
      uses: actions/upload-artifact@v4
      with:
          name: ${{ env.APP_NAME }}-linux-deb-${{ matrix.config.platform_tag }}
          path: deb_package/*.deb

  create-release:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: [build-deb]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        path: ~/artifacts
        merge-multiple: true

    - name: Calculate SHA-256 checksums
      run: |
        cd ~/artifacts
        > hashes.sha256
        for file in $(find . -type f \(-name "*.deb" \)); do
          filename=$(basename "$file")
          sha256sum "$file" | awk -v fname="$filename" '{print $1 " *" fname}' >> hashes.sha256
        done
        cd ..
        tree ~/artifacts

    - name: Setup Release Information
      run: |
        if [ "${{github.ref_type}}" == "tag" ]; then
          echo "PRERELEASE=" >> $GITHUB_ENV
          echo "RELEASE_NAME=${{ env.APP_NAME }} ${{ github.ref_name }}" >> $GITHUB_ENV
          echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "RELEASE_NOTES=--generate-notes" >> $GITHUB_ENV
        else
          echo "PRERELEASE=-p" >> $GITHUB_ENV
          echo "RELEASE_NAME=Continuous Build" >> $GITHUB_ENV
          echo "TAG_NAME=continuous_build" >> $GITHUB_ENV
          echo "RELEASE_NOTES=--notes \"Automated release for commit ${{ github.sha }}\"" >> $GITHUB_ENV
        fi
          
    - name: Create GitHub Release
      continue-on-error: false
      run: |
        # Find existing artifact files
        deb_files=$(find ~/artifacts -name "*.deb" -print0 | xargs -0 echo)

        # Check existing release and delete if it's exist
        if gh release view ${{ env.TAG_NAME }} --repo $GITHUB_REPOSITORY &> /dev/null; then
          if [ "${{ env.TAG_NAME }}" == "continuous_build" ]; then
            gh release delete ${{ env.TAG_NAME }} --repo $GITHUB_REPOSITORY --cleanup-tag  --yes
          else
            gh release delete ${{ env.TAG_NAME }} --repo $GITHUB_REPOSITORY
          fi
          echo "${{ env.TAG_NAME }} deleted!"
        fi
        
        if [ -n "$deb_files" ]; then
          gh release create ${{ env.TAG_NAME }} \
                            $deb_files \
                            ${{ env.PRERELEASE }} \
                            --repo $GITHUB_REPOSITORY \
                            --title "${{ env.RELEASE_NAME }}" \
                            ${{ env.RELEASE_NOTES }}

            echo "${{ env.TAG_NAME }} release created!"
        else
          echo "No artifacts to upload."
          exit 1
        fi
        
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
