name: Build

on:
  push:
    branches: [ '*' ]
    tags: [ '*' ]
  pull_request:
    branches: [ '*' ]
  workflow_dispatch:
  
env:
  APP_NAME: "com-master"

jobs:
  build-deb:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        include:
          - platform: amd64
            image: linuxdeepin/deepin:crimson
          - platform: arm64
            image: linuxdeepin/deepin:crimson-arm64
          - platform: loong64
            image: linuxdeepin/deepin:crimson-loong64
          - platform: riscv64
            image: linuxdeepin/deepin:crimson-riscv64
    steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: ${{ matrix.platform }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - uses: actions/checkout@v5

    - name: Build ${{ matrix.platform }} package
      run: |
        docker run --rm --platform linux/${{ matrix.platform }} -v ${{ github.workspace }}:/workspace \
          ${{ matrix.image }} \
          bash -c "
          cd /workspace &&
          apt update &&
          apt install -y build-essential devscripts dh-make equivs &&
          mk-build-deps -i -t 'apt-get -y' './debian/control' &&
          debuild -us -uc &&
          cp ../*.deb ./
          "

    - name: Move deb to deb_package
      run: |
        if ls ./*dbgsym*.deb 1> /dev/null 2>&1; then
          rm ./*dbgsym*.deb
        fi

        if ls ./*build-deps*.deb 1> /dev/null 2>&1; then
          rm ./*build-deps*.deb
        fi
        
        mkdir deb_package
        cp ./*.deb deb_package

    - name: 'Upload artifact: deb'
      uses: actions/upload-artifact@v4
      with:
          name: ${{ env.APP_NAME }}-linux-deb-${{ matrix.platform }}
          path: deb_package/*.deb

  create-release:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: [build-deb]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        path: ~/artifacts
        merge-multiple: true

    - name: Calculate SHA-256 checksums
      run: |
        cd ~/artifacts
        > hashes.sha256
        for file in $(find . -type f \(-name "*.deb" \)); do
          filename=$(basename "$file")
          sha256sum "$file" | awk -v fname="$filename" '{print $1 " *" fname}' >> hashes.sha256
        done
        cd ..
        tree ~/artifacts

    - name: Setup Release Information
      run: |
        if [ "${{github.ref_type}}" == "tag" ]; then
          echo "PRERELEASE=" >> $GITHUB_ENV
          echo "RELEASE_NAME=${{ env.APP_NAME }} ${{ github.ref_name }}" >> $GITHUB_ENV
          echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "RELEASE_NOTES=--generate-notes" >> $GITHUB_ENV
        else
          echo "PRERELEASE=-p" >> $GITHUB_ENV
          echo "RELEASE_NAME=Continuous Build" >> $GITHUB_ENV
          echo "TAG_NAME=continuous_build" >> $GITHUB_ENV
          echo "RELEASE_NOTES=--notes \"Automated release for commit ${{ github.sha }}\"" >> $GITHUB_ENV
        fi
          
    - name: Create GitHub Release
      continue-on-error: false
      run: |
        # Find existing artifact files
        deb_files=$(find ~/artifacts -name "*.deb" -print0 | xargs -0 echo)

        # Check existing release and delete if it's exist
        if gh release view ${{ env.TAG_NAME }} --repo $GITHUB_REPOSITORY &> /dev/null; then
          if [ "${{ env.TAG_NAME }}" == "continuous_build" ]; then
            gh release delete ${{ env.TAG_NAME }} --repo $GITHUB_REPOSITORY --cleanup-tag  --yes
          else
            gh release delete ${{ env.TAG_NAME }} --repo $GITHUB_REPOSITORY
          fi
          echo "${{ env.TAG_NAME }} deleted!"
        fi
        
        if [ -n "$deb_files" ]; then
          gh release create ${{ env.TAG_NAME }} \
                            $deb_files \
                            ${{ env.PRERELEASE }} \
                            --repo $GITHUB_REPOSITORY \
                            --title "${{ env.RELEASE_NAME }}" \
                            ${{ env.RELEASE_NOTES }}

            echo "${{ env.TAG_NAME }} release created!"
        else
          echo "No artifacts to upload."
          exit 1
        fi
        
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
