name: Build Windows

on:
  push:
    branches: [ '*' ]
    tags: [ '*' ]
  pull_request:
    branches: [ '*' ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt6 with SerialPort
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        modules: 'qtserialport'

    - name: Configure with CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release .

    - name: Build Project
      run: cmake --build build --config Release

    - name: Create Green Version Directory
      id: create_dir
      run: |
        $dirName = "${{ github.event.repository.name }}"
        New-Item -ItemType Directory -Force -Path $dirName
        echo "dirName=$dirName" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Copy Executable and Collect Dependencies
      run: |
        # 复制可执行文件
        $exePath = ".\build\Release\${{ github.event.repository.name }}.exe"
        if (-not (Test-Path $exePath)) {
          $exePath = ".\build\${{ github.event.repository.name }}.exe"
        }
        Copy-Item $exePath ".\${{ steps.create_dir.outputs.dirName }}\"
        
        # 设置Qt环境变量以便windeployqt能找到
        $qtPath = "$env:QT_ROOT_DIR\bin"
        $env:Path = "$qtPath;" + $env:Path
        Write-Host "Qt path added to PATH: $qtPath"
        
        # 使用windeployqt收集依赖
        windeployqt ".\${{ steps.create_dir.outputs.dirName }}\${{ github.event.repository.name }}.exe"
      shell: pwsh

    # 新增：复制 Visual C++ 运行时库
    - name: Copy VC++ Runtime DLLs
      run: |
        # 列出所有需要的VC++运行时DLL
        $requiredDlls = @(
          "msvcp140.dll",
          "msvcp140_1.dll",
          "msvcp140_2.dll",
          "vccorlib140.dll",
          "vcruntime140.dll",
          "vcruntime140_1.dll"
        )

        # 从系统目录复制DLL
        $dest = ".\${{ steps.create_dir.outputs.dirName }}\"
        foreach ($dll in $requiredDlls) {
          $dllPath = "C:\Windows\System32\$dll"
          if (Test-Path $dllPath) {
            Copy-Item $dllPath $dest
            Write-Host "Copied $dll to deployment directory"
          } else {
            Write-Warning "Could not find $dllPath - this may cause runtime errors"
          }
        }
      shell: pwsh

    - name: Package to ZIP
      run: |
        # 使用提交哈希作为版本标识
        $commitHash = "${{ github.sha }}".Substring(0, 8)
        $zipName = "${{ github.event.repository.name }}-windows-x86_64-${commitHash}.zip"
        Compress-Archive -Path ".\${{ steps.create_dir.outputs.dirName }}\*" -DestinationPath $zipName -Force
        echo "zipName=$zipName" >> $env:GITHUB_OUTPUT
      shell: pwsh
      id: package

    # 可选：上传构建产物作为工作流制品
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.package.outputs.zipName }}
        path: ${{ steps.package.outputs.zipName }}
